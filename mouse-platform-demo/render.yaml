services:
  - type: web
    name: mouse-platform
    runtime: node
    buildCommand: cd mouse-platform-demo && npm install && npm run build
    startCommand: cd mouse-platform-demo && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        value: https://automioapp.com
      - key: NEXT_PUBLIC_API_URL
        value: https://automioapp.com/api
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ORGO_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        value: colton.harris@automioapp.com
